<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-body">
        <section class="display"></section>
        <section class="btn">
            <div class="row">
                <button class="cl-btn" id="clear">C</button>
                <button class="cl-btn" id="all-clear">AC</button>
                <button class="sqrtOperator" id="sqrt" value="sqrt">sqrt</button>
                <button class="operator" id="square" value="^">^</button>
            </div>
            <div class="row">
                <button type="button" class="numbers" id="seven" value="7">7</button>
                <button type="button" class="numbers" id="eight" value="8">8</button>
                <button type="button" class="numbers" id="nine" value="9">9</button>
                <button type="button" class="operator" id="divide" value="/">/</button>
            </div>
            <div class="row">
                <button type="button" class="numbers" id="four" value="4">4</button>
                <button type="button" class="numbers" id="five" value="5">5</button>
                <button type="button" class="numbers" id="six" value="6">6</button>
                <button type="button" class="operator" id="multiply" value="*">*</button>
            </div>
            <div class="row">
                <button type="button" class="numbers" id="one" value="1">1</button>
                <button type="button" class="numbers" id="two" value="2">2</button>
                <button type="button" class="numbers" id="three" value="3">3</button>
                <button type="button" class="operator" id="subtract" value="-">-</button>
            </div>
            <div class="row">
                <button id="dot">.</button>
                <button type="button" class="numbers" id="zero" value="0">0</button>
                <button class="operator-equal" id="equal">=</button>
                <button type="button" class="operator" id="add" value="+">+</button>
            </div>
        </section>
    </div>
</body>
<script src="script.js"> </script>
</html>
